<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--
    connect-src default (below) is broad — 'self' https: wss: — because in
    DIRECT mode this app resolves LNURL-pay endpoints and RPC/price feeds on
    whatever arbitrary domain is configured, which cannot be known ahead of
    time. This is a real, unavoidable constraint of doing that resolution
    from the browser itself.

    If you set SINGULARITY_GATEWAY below (routing all external fetches
    through one Mycelium gateway node you control instead of hitting
    arbitrary domains directly), you can — and should — tighten this policy
    by hand to just that origin plus the relays, e.g.:
      connect-src 'self' https://gateway.your-node.example wss://relay.primal.net wss://nos.lol
    CSP is static markup, evaluated before any JS runs, so this cannot be
    narrowed automatically from the SINGULARITY_GATEWAY constant — it has to
    be edited here manually when you deploy with a gateway configured.
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://esm.sh; connect-src 'self' https: wss:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'none'; object-src 'none';">
  <title>root — ETERNETS Cloud</title>
  <script type="module">
    import { schnorr, secp256k1 } from 'https://esm.sh/@noble/curves@1.6.0/secp256k1';
    import { nip19 } from 'https://esm.sh/nostr-tools@2.7.2/nip19';
    import QRCode from 'https://esm.sh/qrcode@1.5.3';
    import { ethers } from 'https://esm.sh/ethers@6.13.4';
    window.schnorr = schnorr; window.secp256k1 = secp256k1;

    // ─── Constants ──────────────────────────────────────────
    const RELAYS = ['wss://relay.primal.net', 'wss://nos.lol'];
    const K = { TRANSFER: 30000, LICENSE: 30001, LEAD: 30002, CONFIG: 30004 };
    const PRICE_API = 'https://mempool.space/api/v1/prices'; // { USD: <btc price> }

    // ─── Runtime configuration ────────────────────────────────
    // Everything operational — Lightning address, RPC endpoint, CatFish
    // contract address, gateway URL — lives in ONE place: a single signed
    // CONFIG event (kind 30004) published by the admin key through the
    // Settings tab. There is nothing to edit in this file to configure a
    // deployment, manage it, or hand the same file to a different client:
    // whoever holds ADMIN_NPUB's key opens Settings, fills the form, hits
    // Publish, and every instance of this page picks it up automatically
    // the next time it connects to a relay. The only thing that has to be
    // baked into the file at build time is ADMIN_NPUB itself (below) — that
    // one line is unavoidable, since a page can't safely decide who its own
    // admin is at runtime.
    let cfg = { lightning: '', rpcUrl: '', contractAddress: '', gatewayUrl: '' };

    const CATFISH_ABI = [
      'function balanceOf(address) view returns (uint256)',
      'function transfer(address to, uint256 amount) returns (bool)',
      'function decimals() view returns (uint8)'
    ];
    let catfishProvider = null, catfishContract = null, catfishDecimals = 18;
    const onChainMode = () => !!(cfg.rpcUrl && cfg.contractAddress);

    // Every Nostr identity here is a secp256k1 keypair. Ethereum uses the
    // same curve (different pubkey serialization/address derivation), so
    // one private key can drive both a Nostr npub and a real EVM account —
    // no separate wallet needed. This does mean anyone who compromises the
    // stored key gets both identities; treat it accordingly.
    function skToEthWallet(skBytes, provider) {
      return new ethers.Wallet('0x' + toHex(skBytes), provider);
    }

    async function initCatfish() {
      if (!onChainMode()) { catfishProvider = null; catfishContract = null; return; }
      try {
        catfishProvider = new ethers.JsonRpcProvider(cfg.rpcUrl);
        catfishContract = new ethers.Contract(cfg.contractAddress, CATFISH_ABI, catfishProvider);
        catfishDecimals = await catfishContract.decimals();
        log('On-chain CTF ledger active (CatFish.sol).', 'ok');
        await refreshOnChainBalance();
      } catch (e) {
        catfishProvider = null; catfishContract = null;
        log('Could not reach CatFish contract, falling back to event-based balance: ' + e.message, 'err');
      }
    }

    async function refreshOnChainBalance() {
      if (!catfishContract) return;
      const wallet = skToEthWallet(sk, catfishProvider);
      const raw = await catfishContract.balanceOf(wallet.address);
      balance.ctf = Number(ethers.formatUnits(raw, catfishDecimals));
      updateUI();
    }

    // ─── Gateway proxy ────────────────────────────────────────
    // LNURL-pay resolution needs to hit whatever domain the configured
    // Lightning address points to, which is arbitrary by protocol design —
    // that's why connect-src has to stay broad in direct mode. Setting
    // cfg.gatewayUrl (via Settings) routes those fetches through one node
    // you control instead: the browser only ever talks to that one origin,
    // and the node does the outbound fetch on the browser's behalf. This
    // still can't narrow the CSP <meta> tag automatically — CSP is static
    // markup evaluated before any JS runs — so tighten it by hand once you
    // have a stable gateway URL. Until then, direct mode with the broad
    // policy is the honest default.
    function gatewayFetch(url, opts) {
      if (cfg.gatewayUrl) return fetch(cfg.gatewayUrl + '/proxy?url=' + encodeURIComponent(url), opts);
      return fetch(url, opts);
    }

    // ROOT OF TRUST
    // This must be a real NIP-19 bech32 npub (starts npub1..., 63 chars).
    // To provision a deployment: open the console on a device you control,
    // run `await window.newKey()`, copy the printed npub, and put it here.
    // Until this is a valid npub belonging to a key you hold, admin actions
    // (Lightning address configuration) cannot be verified by anyone,
    // including this device.
    const ADMIN_NPUB = 'npub1replace0000000000000000000000000000000000000000000000000'; // placeholder — replace before production use

    let adminPkHex = null;
    try { adminPkHex = nip19.decode(ADMIN_NPUB).data; } catch (_) { adminPkHex = null; }

    let sk = null, pk = null, npub = '';
    let wsList = [];
    let balance = { ctf: 0, hcr: 0 };
    let adminVerified = false;
    const seenEventIds = new Set();
    let invoicePoll = null; // active setInterval handle for payment polling

    // ─── Encoding utils ─────────────────────────────────────
    function toHex(b) { return Array.from(b).map(x => x.toString(16).padStart(2, '0')).join(''); }
    function fromHex(s) { return new Uint8Array(s.match(/.{2}/g).map(x => parseInt(x, 16))); }
    function pubkeyToNpub(pkHex) { return nip19.npubEncode(pkHex); }
    function isAdminPubkey(pkHex) { return !!adminPkHex && pkHex === adminPkHex; }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function log(msg, type = 'info') {
      const el = document.getElementById('log');
      const d = document.createElement('div');
      d.className = 'l-' + type;
      d.textContent = msg;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }

    function updateUI() {
      document.getElementById('npubDisplay').textContent = npub ? npub.slice(0, 12) + '...' : '—';
      document.getElementById('balCtf').textContent = balance.ctf;
      document.getElementById('balHcr').textContent = balance.hcr;
    }

    // ─── Key storage (optional passphrase encryption) ───────
    async function deriveAesKey(passphrase, salt) {
      const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(passphrase), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 210000, hash: 'SHA-256' }, baseKey, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
    }
    async function encryptSecret(skBytes, passphrase) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveAesKey(passphrase, salt);
      const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, skBytes);
      return { salt: toHex(salt), iv: toHex(iv), ct: toHex(new Uint8Array(ct)) };
    }
    async function decryptSecret(blob, passphrase) {
      const key = await deriveAesKey(passphrase, fromHex(blob.salt));
      const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: fromHex(blob.iv) }, key, fromHex(blob.ct));
      return new Uint8Array(pt);
    }

    async function newKey() {
      const skBytes = secp256k1.utils.randomPrivateKey();
      const usePass = confirm('Protect this key with a passphrase? (Recommended. Cancel to store it unencrypted on this device.)');
      if (usePass) {
        const pass = prompt('Enter a passphrase (required every time this page loads):');
        if (pass) {
          const blob = await encryptSecret(skBytes, pass);
          localStorage.setItem('root_sk_enc', JSON.stringify(blob));
          localStorage.removeItem('root_sk');
        } else {
          localStorage.setItem('root_sk', toHex(skBytes));
          localStorage.removeItem('root_sk_enc');
        }
      } else {
        localStorage.setItem('root_sk', toHex(skBytes));
        localStorage.removeItem('root_sk_enc');
      }
      sk = skBytes;
      pk = schnorr.getPublicKey(sk);
      npub = pubkeyToNpub(toHex(pk));
      updateUI();
      log('New identity generated: ' + npub.slice(0, 16) + '...', 'ok');
      return { sk, pk, npub };
    }

    async function loadKey() {
      const encRaw = localStorage.getItem('root_sk_enc');
      if (encRaw) {
        const blob = JSON.parse(encRaw);
        const pass = prompt('Enter your passphrase to unlock your identity:');
        if (!pass) { log('Locked. Reload and enter your passphrase to continue.', 'err'); return; }
        try { sk = await decryptSecret(blob, pass); }
        catch (e) { log('Incorrect passphrase or corrupted key store.', 'err'); return; }
        pk = schnorr.getPublicKey(sk);
        npub = pubkeyToNpub(toHex(pk));
        return;
      }
      const s = localStorage.getItem('root_sk');
      if (!s) { await newKey(); return; }
      sk = fromHex(s);
      pk = schnorr.getPublicKey(sk);
      npub = pubkeyToNpub(toHex(pk));
    }

    function exportBackup() {
      if (!confirm('This reveals your private key (nsec). Anyone who sees it can fully control this identity and any funds tagged to it. Continue?')) return;
      const nsec = nip19.nsecEncode(sk);
      log('nsec backup (copy now, this is only shown once): ' + nsec, 'err');
      navigator.clipboard.writeText(nsec).catch(() => {});
    }

    // ─── Nostr event signing / verification ─────────────────
    async function signEvent(content, kind, tags) {
      const pkHex = toHex(pk);
      const ev = { pubkey: pkHex, created_at: Math.floor(Date.now() / 1000), kind, tags: tags || [], content: JSON.stringify(content) };
      const ser = JSON.stringify([0, ev.pubkey, ev.created_at, ev.kind, ev.tags, ev.content]);
      const hash = new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(ser)));
      ev.id = toHex(hash);
      ev.sig = toHex(schnorr.sign(hash, toHex(sk)));
      return ev;
    }

    async function verifyEvent(ev) {
      try {
        if (!ev || !ev.id || !ev.sig || !ev.pubkey) return false;
        const ser = JSON.stringify([0, ev.pubkey, ev.created_at, ev.kind, ev.tags || [], ev.content]);
        const hash = new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(ser)));
        if (toHex(hash) !== ev.id) return false;
        return schnorr.verify(fromHex(ev.sig), fromHex(ev.id), fromHex(ev.pubkey));
      } catch (_) { return false; }
    }

    function publish(ev) {
      wsList.forEach(ws => { try { ws.send(JSON.stringify(['EVENT', ev])); } catch (_) {} });
    }

    // Single funnel for turning a verified CONFIG payload into live state.
    // Reused whether the config came from the relay (any client) or was
    // just published by this device (admin, immediately after signing).
    async function applyConfig(d) {
      cfg.lightning = d.lightning || cfg.lightning;
      cfg.rpcUrl = d.rpcUrl ?? cfg.rpcUrl;
      cfg.contractAddress = d.contractAddress ?? cfg.contractAddress;
      cfg.gatewayUrl = d.gatewayUrl ?? cfg.gatewayUrl;
      adminVerified = true;
      localStorage.setItem('root_cfg_cache', JSON.stringify(cfg)); // local cache only — always re-verified on next load, never trusted on its own
      if (onChainMode()) await initCatfish();
    }

    // ─── Relay connection ────────────────────────────────────
    function connect() {
      RELAYS.forEach(url => {
        try {
          const ws = new WebSocket(url);
          ws.onopen = () => {
            wsList.push(ws);
            ws.send(JSON.stringify(['REQ', 'bal', { kinds: [K.TRANSFER], '#t': ['freepay'], limit: 50 }]));
            ws.send(JSON.stringify(['REQ', 'cfg', { kinds: [K.CONFIG], limit: 5 }]));
            log('Connected: ' + url.replace('wss://', ''), 'ok');
          };
          ws.onmessage = async e => {
            try {
              const [type, , ev] = JSON.parse(e.data);
              if (type !== 'EVENT' || !ev) return;
              if (seenEventIds.has(ev.id)) return;
              const valid = await verifyEvent(ev);
              if (!valid) { log('Rejected event with invalid signature.', 'err'); return; }
              seenEventIds.add(ev.id);
              const d = JSON.parse(ev.content);

              if (ev.kind === K.CONFIG) {
                if (isAdminPubkey(ev.pubkey)) {
                  await applyConfig(d);
                  log('Configuration verified from admin key.', 'ok');
                } else {
                  log('Ignored configuration from unverified key: ' + pubkeyToNpub(ev.pubkey).slice(0, 12), 'err');
                }
              }
              if (ev.kind === K.TRANSFER) {
                if (d.to === toHex(pk)) balance.ctf += Number(d.amount) || 0;
                if (d.from === toHex(pk)) balance.ctf -= Number(d.amount) || 0;
              }
              updateUI();
            } catch (_) {}
          };
          ws.onerror = () => log('Connection error: ' + url.replace('wss://', ''), 'err');
          ws.onclose = () => { wsList = wsList.filter(s => s !== ws); log('Disconnected: ' + url.replace('wss://', ''), 'err'); };
        } catch (e) { log('Could not connect: ' + url, 'err'); }
      });
    }

    // ─── FreePay ──────────────────────────────────────────
    // In on-chain mode, sends are real contract.transfer() calls settled by
    // the chain — balances can't be spoofed by publishing arbitrary Nostr
    // events anymore. Without a configured contract, this falls back to the
    // old event-derived ledger, which stays clearly labeled as
    // informational/test-only rather than presented as real value.
    async function transfer() {
      const to = document.getElementById('fpTo').value.trim();
      const amt = document.getElementById('fpAmt').value.trim();
      if (!to || !amt) { log('Enter a recipient and an amount.', 'err'); return; }
      const amtNum = Number(amt);
      if (!Number.isFinite(amtNum) || amtNum <= 0) { log('Amount must be a positive number.', 'err'); return; }

      if (onChainMode() && catfishContract) {
        if (!ethers.isAddress(to)) { log('In on-chain mode, recipient must be an Ethereum address (0x...).', 'err'); return; }
        try {
          const wallet = skToEthWallet(sk, catfishProvider);
          const contractWithSigner = catfishContract.connect(wallet);
          const amountUnits = ethers.parseUnits(String(amtNum), catfishDecimals);
          log('Submitting on-chain transfer...', 'info');
          const tx = await contractWithSigner.transfer(to, amountUnits);
          log('Transaction sent: ' + tx.hash, 'ok');
          await tx.wait();
          log('Confirmed on-chain.', 'ok');
          await refreshOnChainBalance();
        } catch (e) {
          log('On-chain transfer failed: ' + (e.shortMessage || e.message), 'err');
        }
        return;
      }

      // Fallback: event-derived, non-canonical ledger.
      let toHexKey;
      try { toHexKey = to.startsWith('npub1') ? nip19.decode(to).data : (/^[0-9a-f]{64}$/i.test(to) ? to : null); }
      catch (_) { toHexKey = null; }
      if (!toHexKey) { log('Recipient is not a valid npub or hex key.', 'err'); return; }
      if (amtNum > balance.ctf) { log('Amount exceeds your current balance.', 'err'); return; }
      const ev = await signEvent({ from: toHex(pk), to: toHexKey, amount: amtNum, asset: 'CTF' }, K.TRANSFER, [['t', 'freepay'], ['p', toHexKey]]);
      publish(ev);
      balance.ctf -= amtNum;
      log('Sent ' + amtNum + ' CTF to ' + to.slice(0, 12) + '... (off-chain, informational ledger)', 'ok');
      updateUI();
    }

    async function faucet() {
      if (onChainMode()) {
        log('On-chain mode is active — there is no faucet; CTF supply is governed by the CatFish.sol contract.', 'err');
        return;
      }
      const ev = await signEvent({ to: toHex(pk), amount: '1000', asset: 'CTF' }, K.TRANSFER, [['t', 'freepay'], ['p', toHex(pk)]]);
      publish(ev);
      balance.ctf += 1000;
      log('Test faucet: +1000 CTF (off-chain, informational ledger — not real value)', 'ok');
      updateUI();
    }

    // ─── Lightning: LNURL-pay + LUD-21 verify ────────────────
    async function resolveLnurlPay(address) {
      const [name, domain] = address.split('@');
      if (!name || !domain) throw new Error('Malformed Lightning address');
      const res = await gatewayFetch(`https://${domain}/.well-known/lnurlp/${encodeURIComponent(name)}`);
      if (!res.ok) throw new Error('LNURL-pay endpoint returned ' + res.status);
      const meta = await res.json();
      if (meta.tag !== 'payRequest' || !meta.callback) throw new Error('Not a valid LNURL-pay endpoint');
      return meta;
    }

    async function getBtcUsdPrice() {
      const res = await gatewayFetch(PRICE_API);
      if (!res.ok) throw new Error('Price feed returned ' + res.status);
      const data = await res.json();
      if (!data.USD) throw new Error('Price feed missing USD price');
      return Number(data.USD);
    }

    async function requestInvoice(meta, amountMsat) {
      const url = new URL(meta.callback);
      url.searchParams.set('amount', String(amountMsat));
      const res = await gatewayFetch(url.toString());
      const data = await res.json();
      if (data.status === 'ERROR' || !data.pr) throw new Error(data.reason || 'Invoice request failed');
      return data; // { pr, verify?, successAction? }
    }

    function stopInvoicePoll() {
      if (invoicePoll) { clearInterval(invoicePoll); invoicePoll = null; }
    }

    function renderInvoiceStatus(text, cls) {
      const el = document.getElementById('licInvoiceStatus');
      if (el) { el.textContent = text; el.className = 'pay-box-status ' + (cls || ''); }
    }

    async function onPaymentConfirmed(invoiceData, plan, price, clientKeyRaw) {
      stopInvoicePoll();
      renderInvoiceStatus('Payment confirmed.', 'ok-text');
      const names = { indie: 'VOID Indie', pro: 'VOID Pro', enterprise: 'VOID Enterprise' };
      const id = 'void-' + toHex(secp256k1.utils.randomPrivateKey()).slice(0, 12);
      const ev = await signEvent(
        { licenseId: id, plan, clientPubkey: clientKeyRaw, price, currency: 'USD', lightning: cfg.lightning, paid: true, preimage: invoiceData.preimage || null, issuedAt: Date.now() },
        K.LICENSE, [['t', 'void'], ['p', clientKeyRaw]]
      );
      publish(ev);
      log(names[plan] + ' license issued after confirmed payment (id ' + id + ').', 'ok');
    }

    async function buyLicense() {
      const plan = document.getElementById('licPlan').value;
      const clientKeyRaw = document.getElementById('licKey').value.trim() || npub;
      let clientKeyHex;
      try { clientKeyHex = clientKeyRaw.startsWith('npub1') ? nip19.decode(clientKeyRaw).data : (/^[0-9a-f]{64}$/i.test(clientKeyRaw) ? clientKeyRaw : null); }
      catch (_) { clientKeyHex = null; }
      if (!clientKeyHex) { log('Enter a valid key to receive the license.', 'err'); return; }
      const prices = { indie: 1000, pro: 5000, enterprise: 100000 };
      const price = prices[plan];
      if (!adminVerified) { log('Admin Lightning address is not yet verified. Cannot generate an invoice.', 'err'); return; }

      stopInvoicePoll();
      renderInvoiceStatus('Resolving payment endpoint...', '');
      document.getElementById('licInvoiceArea').style.display = 'block';
      document.getElementById('licInvoiceQr').src = '';

      try {
        const meta = await resolveLnurlPay(cfg.lightning);
        const btcUsd = await getBtcUsdPrice();
        const sats = Math.ceil((price / btcUsd) * 1e8);
        const amountMsat = sats * 1000;
        if (amountMsat < meta.minSendable || amountMsat > meta.maxSendable) {
          renderInvoiceStatus('Amount outside the range this address accepts.', 'err-text');
          return;
        }
        renderInvoiceStatus('Requesting invoice for ' + sats + ' sats (~$' + price + ')...', '');
        const invoiceData = await requestInvoice(meta, amountMsat);
        const qrDataUrl = await QRCode.toDataURL('lightning:' + invoiceData.pr, { margin: 1, width: 240 });
        document.getElementById('licInvoiceQr').src = qrDataUrl;
        document.getElementById('licInvoiceText').value = invoiceData.pr;
        document.getElementById('licInvoiceArea').dataset.pr = invoiceData.pr;

        if (invoiceData.verify) {
          renderInvoiceStatus('Invoice generated — waiting for payment...', '');
          invoicePoll = setInterval(async () => {
            try {
              const res = await gatewayFetch(invoiceData.verify);
              const status = await res.json();
              if (status.settled) await onPaymentConfirmed({ ...invoiceData, preimage: status.preimage }, plan, price, clientKeyHex);
            } catch (_) { /* transient network error, keep polling */ }
          }, 4000);
        } else {
          renderInvoiceStatus('Invoice generated. This provider does not support automatic verification (LUD-21) — pay, then use "I have paid" for a manual, unverified license request.', '');
          document.getElementById('licManualConfirm').style.display = 'block';
          document.getElementById('licManualConfirm').onclick = async () => {
            if (!confirm('This will issue a license marked as unverified payment, pending manual admin review. Continue?')) return;
            const names = { indie: 'VOID Indie', pro: 'VOID Pro', enterprise: 'VOID Enterprise' };
            const id = 'void-' + toHex(secp256k1.utils.randomPrivateKey()).slice(0, 12);
            const ev = await signEvent(
              { licenseId: id, plan, clientPubkey: clientKeyHex, price, currency: 'USD', lightning: cfg.lightning, paid: 'unverified', issuedAt: Date.now() },
              K.LICENSE, [['t', 'void'], ['p', clientKeyHex]]
            );
            publish(ev);
            log(names[plan] + ' unverified license request submitted (id ' + id + ') — pending admin review.', 'info');
          };
        }
      } catch (e) {
        renderInvoiceStatus('Could not generate invoice: ' + e.message, 'err-text');
      }
    }

    async function sendInquiry() {
      const msg = document.getElementById('pqcMsg').value.trim();
      if (!msg) { log('Describe your request before sending.', 'err'); return; }
      const ev = await signEvent({ message: msg, from: npub }, K.LEAD, [['t', 'pqc']]);
      publish(ev);
      document.getElementById('pqcMsg').value = '';
      log('Inquiry sent.', 'ok');
    }

    // ─── Admin: publish configuration ─────────────────────
    // One form, one signed event, one place to manage a deployment. This is
    // the only "admin action" in the app — everything else (Lightning
    // address, RPC endpoint, contract address, gateway URL) flows from it.
    async function publishConfig() {
      const isSelfAdmin = isAdminPubkey(toHex(pk));
      if (!isSelfAdmin) {
        if (!confirm('Your current key does not match ADMIN_NPUB. Other clients will reject this update. Publish anyway?')) return;
      } else if (adminVerified && !confirm('Update the published configuration?')) {
        return;
      }
      const lightning = document.getElementById('cfgLightning').value.trim();
      const rpcUrl = document.getElementById('cfgRpcUrl').value.trim();
      const contractAddress = document.getElementById('cfgContract').value.trim();
      const gatewayUrl = document.getElementById('cfgGateway').value.trim();
      if (!lightning || !lightning.includes('@')) { log('Enter a valid Lightning address.', 'err'); return; }
      if (contractAddress && !ethers.isAddress(contractAddress)) { log('Contract address is not a valid Ethereum address.', 'err'); return; }

      const payload = { lightning, rpcUrl, contractAddress, gatewayUrl, updatedAt: Date.now() };
      const ev = await signEvent(payload, K.CONFIG, [['t', 'config']]);
      publish(ev);
      if (isSelfAdmin) {
        await applyConfig(payload);
        log('Configuration published and applied locally as the admin key.', 'ok');
      } else {
        log('Published, but this key is not the admin key — other clients will not trust it.', 'err');
      }
      showTab('settings');
    }

    // ─── Tab rendering ────────────────────────────────────
    const TABS = {
      pay: () => `<div class="card"><h2>FreePay</h2><p>${onChainMode()
          ? 'CTF transfers settle as real CatFish.sol contract calls. Balance is canonical on-chain state, not something a client can fabricate.'
          : 'Peer-to-peer CTF transfers via signed Nostr events. Balance is derived from observed, signature-verified event history and is informational only — not backed by any issuer.'}</p>
        <input type="text" id="fpTo" placeholder="${onChainMode() ? 'Recipient Ethereum address (0x...)' : 'Recipient npub or hex key'}" autocomplete="off" />
        <input type="text" id="fpAmt" placeholder="Amount" inputmode="decimal" />
        <button class="btn prim" onclick="window.transfer()">Send</button>
        <button class="btn sec" onclick="window.faucet()" ${onChainMode() ? 'disabled' : ''}>Request test funds</button></div>`,

      license: () => `<div class="card"><h2>VOID License</h2><p>AGPL to MIT relicensing. Payment via Bitcoin Lightning, invoiced live through LNURL-pay.</p>
        <select id="licPlan">
          <option value="indie">VOID Indie — $1,000 / yr</option>
          <option value="pro">VOID Pro — $5,000 / yr</option>
          <option value="enterprise">VOID Enterprise — $100,000 / yr</option>
        </select>
        <input type="text" id="licKey" placeholder="Key to receive the license (defaults to yours)" autocomplete="off" />
        <div class="pay-box">
          <div class="pay-box-label">Lightning address</div>
          <div class="pay-box-status">${adminVerified ? 'Verified — <strong>' + escapeHtml(cfg.lightning) + '</strong>' : 'Waiting for admin configuration from the relay network...'}</div>
        </div>
        <button class="btn prim" onclick="window.buyLicense()" ${adminVerified ? '' : 'disabled'}>Generate invoice</button>
        <div id="licInvoiceArea" style="display:none;">
          <div class="pay-box">
            <img id="licInvoiceQr" style="width:180px;height:180px;display:block;margin:0 auto 8px;border-radius:8px;background:#fff;padding:8px;" />
            <div id="licInvoiceStatus" class="pay-box-status">—</div>
            <textarea id="licInvoiceText" rows="2" readonly style="font-size:0.65rem;font-family:monospace;"></textarea>
            <button class="btn sec" style="padding:8px;font-size:0.8rem;" onclick="navigator.clipboard.writeText(document.getElementById('licInvoiceText').value)">Copy invoice</button>
            <button id="licManualConfirm" class="btn sec" style="display:none;padding:8px;font-size:0.8rem;">I have paid</button>
          </div>
        </div></div>`,

      pqc: () => `<div class="card"><h2>PQC Shield</h2><p>Post-quantum migration services, aligned to NIST FIPS 203 / 204.</p>
        <div class="stat"><span class="lbl">Audit</span><span class="val">$10,000</span></div>
        <div class="stat"><span class="lbl">Implementation</span><span class="val">$25,000</span></div>
        <div class="stat"><span class="lbl">Enterprise support</span><span class="val">$200,000 / yr</span></div>
        <textarea id="pqcMsg" rows="3" placeholder="Describe your requirements"></textarea>
        <button class="btn prim" onclick="window.sendInquiry()">Send inquiry</button></div>`,

      about: () => `<div class="card"><h2>root</h2><p>A self-custodied client on Nostr. No application server. No custodial bank.</p>
        <div class="stat"><span class="lbl">Relays connected</span><span class="val">${wsList.length} / ${RELAYS.length}</span></div>
        <div class="stat"><span class="lbl">Status</span><span class="val" style="color:#22c55e">live</span></div>
        <div class="stat"><span class="lbl">Ledger</span><span class="val">${onChainMode() ? 'on-chain' : 'off-chain (test)'}</span></div>
        <div class="stat"><span class="lbl">Your key</span><span class="val" style="font-size:0.65rem">${escapeHtml(npub.slice(0, 16))}...</span></div>
        <div class="key-display">${escapeHtml(npub)}</div>
        <div class="divider">
          <p class="fine-print">Your key is stored only on this device (optionally passphrase-encrypted). There is no account recovery — losing your device or passphrase means losing this identity.</p>
          <button class="btn sec" style="margin-top:6px;padding:8px;font-size:0.8rem;" onclick="window.exportBackup()">Reveal backup (nsec)</button>
        </div></div>`,

      settings: () => `<div class="card"><h2>Settings</h2><p>Everything operational for this deployment lives here, in one signed configuration event. Fill this in once as the admin key and it propagates to every client automatically — no file to edit, no redeploy.</p>
        <div class="pay-box" style="text-align:left;">
          <div class="pay-box-label">Current status</div>
          <div class="pay-box-status ${adminVerified ? 'ok-text' : ''}">${adminVerified ? 'Verified configuration active' : 'No verified configuration yet'}</div>
        </div>
        <label class="section-label">Lightning address</label>
        <input type="text" id="cfgLightning" placeholder="you@getalby.com" value="${escapeHtml(cfg.lightning)}" autocomplete="off" />
        <label class="section-label">RPC endpoint (optional — enables on-chain CTF)</label>
        <input type="text" id="cfgRpcUrl" placeholder="https://your-rpc-provider.example/v1/..." value="${escapeHtml(cfg.rpcUrl)}" autocomplete="off" />
        <label class="section-label">CatFish contract address (optional)</label>
        <input type="text" id="cfgContract" placeholder="0x..." value="${escapeHtml(cfg.contractAddress)}" autocomplete="off" />
        <label class="section-label">Gateway URL (optional — proxies LNURL/price fetches)</label>
        <input type="text" id="cfgGateway" placeholder="https://gateway.your-node.example" value="${escapeHtml(cfg.gatewayUrl)}" autocomplete="off" />
        <button class="btn prim" onclick="window.publishConfig()">Publish configuration</button>
        <div class="divider">
          <p class="fine-print">Admin key for this deployment: <strong>${escapeHtml(ADMIN_NPUB)}</strong><br/>
          Only a signature-verified kind 30004 event from this key is ever accepted — publishing from any other key is visible here for convenience but every other client will correctly ignore it.</p>
        </div></div>`
    };

    function showTab(name) {
      if (name !== 'license') stopInvoicePoll();
      document.getElementById('tabContent').innerHTML = (TABS[name] || TABS.pay)();
      document.querySelectorAll('.tabs a').forEach(a => a.classList.remove('active'));
      const tabBtn = document.querySelector(`.tabs a[data-tab="${name}"]`);
      if (tabBtn) tabBtn.classList.add('active');
    }

    window.newKey = newKey; window.transfer = transfer; window.faucet = faucet;
    window.buyLicense = buyLicense; window.sendInquiry = sendInquiry;
    window.publishConfig = publishConfig; window.showTab = showTab; window.exportBackup = exportBackup;

    // ─── Init ──────────────────────────────────────────────
    (async () => {
      if (!adminPkHex) log('ADMIN_NPUB is not a valid npub yet — admin actions are disabled until it is configured.', 'err');

      // Paint instantly from the last locally-cached config so the UI isn't
      // blank while relays connect. This cache is never trusted on its own
      // — adminVerified stays false until a real signed event confirms it.
      try {
        const cached = localStorage.getItem('root_cfg_cache');
        if (cached) cfg = { ...cfg, ...JSON.parse(cached) };
      } catch (_) {}

      await loadKey();
      if (!sk) return; // locked pending passphrase
      showTab('pay');
      connect();
      updateUI();
      log('root loaded.');
      log('Identity: ' + npub.slice(0, 16) + '...', 'ok');
      log(onChainMode() ? 'CTF ledger: on-chain (pending verification from relay).' : 'CTF ledger: off-chain, informational only until an admin publishes an RPC/contract in Settings.', 'info');
    })();
  </script>
  <style>
    :root { --bg: #0a0a0f; --surface: #12121e; --accent: #7c3aed; --text: #e4e4ec; --muted: #7a7a8c; --err: #ef4444; --border: #1e1e2e; --border-2: #2a2a3e; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
    .container { max-width: 480px; margin: 0 auto; padding: 16px; flex: 1; width: 100%; }
    header { text-align: center; padding: 28px 0 8px; }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.02em; color: var(--text); }
    header p { font-size: 0.8rem; color: var(--muted); margin-top: 4px; letter-spacing: 0.02em; }
    .badges { margin-top: 10px; display: flex; justify-content: center; gap: 6px; }
    .bar { background: var(--surface); border-radius: 10px; padding: 10px 14px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; border: 1px solid var(--border); }
    .bar .label { color: var(--muted); margin-right: 4px; }
    .tabs { display: flex; gap: 4px; margin: 8px 0; }
    .tabs a { flex: 1; padding: 10px; text-align: center; border-radius: 8px; border: 1px solid var(--border-2); background: var(--surface); color: var(--muted); cursor: pointer; text-decoration: none; font-size: 0.8rem; transition: all .15s; }
    .tabs a:hover { border-color: var(--accent); color: var(--text); }
    .tabs a.active { border-color: var(--accent); color: var(--accent); background: #1a1a2e; }
    .card { background: var(--surface); border-radius: 12px; padding: 18px; margin: 8px 0; border: 1px solid var(--border); }
    .card h2 { font-size: 1rem; margin-bottom: 8px; font-weight: 600; }
    .card p { font-size: 0.85rem; color: var(--muted); line-height: 1.55; }
    input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border-2); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 0.9rem; margin: 6px 0; font-family: inherit; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; min-height: 50px; }
    .btn { display: block; width: 100%; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; border: none; cursor: pointer; margin: 6px 0; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn.prim { background: var(--accent); color: white; }
    .btn.sec { background: #1e2233; color: var(--text); }
    .stat { font-size: 0.85rem; padding: 5px 0; }
    .stat .lbl { color: var(--muted); }
    .stat .val { font-family: 'SF Mono', Menlo, monospace; float: right; }
    .key-display { font-family: 'SF Mono', Menlo, monospace; font-size: 0.7rem; color: var(--muted); word-break: break-all; background: var(--bg); padding: 8px; border-radius: 6px; margin-top: 4px; }
    .pay-box { background: var(--bg); border-radius: 8px; padding: 12px; margin: 10px 0; text-align: center; border: 1px solid var(--border); }
    .pay-box-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .pay-box-status { font-size: 0.72rem; color: var(--muted); margin-bottom: 6px; }
    .pay-box-status.ok-text { color: #22c55e; }
    .pay-box-status.err-text { color: var(--err); }
    .divider { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .section-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
    .fine-print { font-size: 0.68rem; color: var(--muted); line-height: 1.5; }
    .log { background: var(--bg); border-radius: 8px; padding: 8px; font-family: 'SF Mono', Menlo, monospace; font-size: 0.65rem; max-height: 120px; overflow-y: auto; word-break: break-all; }
    .log .l-ok { color: #22c55e; padding: 1px 0; }
    .log .l-err { color: var(--err); padding: 1px 0; }
    .log .l-info { color: var(--muted); padding: 1px 0; }
    footer { text-align: center; color: var(--muted); font-size: 0.65rem; padding: 18px 0; border-top: 1px solid var(--border); margin-top: auto; letter-spacing: 0.02em; }
    .badge { display: inline-block; background: #1a1a2e; padding: 3px 8px; border-radius: 4px; font-size: 0.65rem; border: 1px solid var(--border-2); color: var(--muted); letter-spacing: 0.03em; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>root</h1>
      <p>Sovereign cloud on Nostr</p>
      <div class="badges">
        <span class="badge">NOSTR</span>
        <span class="badge">PEER-TO-PEER</span>
        <span class="badge">TEST LEDGER</span>
      </div>
    </header>

    <div class="bar">
      <span><span class="label">key</span><span id="npubDisplay">—</span></span>
      <span><span class="label">ctf</span><span id="balCtf">0</span></span>
      <span><span class="label">hcr</span><span id="balHcr">0</span></span>
      <button class="btn sec" style="padding:5px 10px;font-size:0.65rem;margin:0;width:auto;" onclick="window.newKey()">New key</button>
    </div>

    <div class="tabs">
      <a href="#" data-tab="pay" class="active" onclick="event.preventDefault();window.showTab('pay')">Pay</a>
      <a href="#" data-tab="license" onclick="event.preventDefault();window.showTab('license')">License</a>
      <a href="#" data-tab="pqc" onclick="event.preventDefault();window.showTab('pqc')">PQC</a>
      <a href="#" data-tab="about" onclick="event.preventDefault();window.showTab('about')">About</a>
      <a href="#" data-tab="settings" onclick="event.preventDefault();window.showTab('settings')">Settings</a>
    </div>

    <div id="tabContent"></div>

    <div class="card" style="padding:6px;">
      <div class="log" id="log"></div>
    </div>

    <footer>root — ETERNETS · AGPL-3.0 · runs entirely on Nostr</footer>
  </div>
</body>
</html>
